<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F172A" />
  <meta name="description" content="Crypto Pulse – Realtidsspårning av kryptovalutor" />
  <title>Crypto Pulse</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="splash-logo">
      <div class="splash-icon">₿</div>
      <h1>Crypto Pulse</h1>
      <p>Realtidsspårning</p>
    </div>
    <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  </div>

  <!-- APP SHELL -->
  <div id="app" class="hidden">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <span class="app-logo">⬡</span>
        <span class="app-name">Crypto Pulse</span>
      </div>
      <div class="header-right">
        <button id="install-btn" class="icon-btn install-btn" title="Installera app" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <div id="refresh-btn" class="icon-btn" title="Uppdatera">
          <svg id="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </div>
        <div id="last-updated" class="last-updated">–</div>
      </div>
    </header>

    <!-- NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Marknad</span>
      </button>
      <button class="nav-btn" data-view="watchlist">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span>Watchlist</span>
      </button>
    </nav>

    <!-- VIEWS -->
    <main class="view-container">

      <!-- DASHBOARD VIEW -->
      <section id="view-dashboard" class="view active">
        <div class="view-header">
          <h2>Marknaden</h2>
          <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="search-input" type="text" placeholder="Sök kryptovaluta..." class="search-input" />
          </div>
        </div>
        <div id="coin-list" class="coin-list">
          <div class="skeleton-list">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </div>
      </section>

      <!-- WATCHLIST VIEW -->
      <section id="view-watchlist" class="view">
        <div class="view-header">
          <h2>Min Watchlist</h2>
          <span id="watchlist-count" class="badge">0</span>
        </div>
        <div id="watchlist-list" class="coin-list">
          <div class="empty-state">
            <div class="empty-icon">★</div>
            <p>Din watchlist är tom</p>
            <small>Gå till Marknaden och spara dina favoriter</small>
          </div>
        </div>
      </section>

      <!-- DETAIL VIEW -->
      <section id="view-detail" class="view">
        <button id="back-btn" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Tillbaka
        </button>
        <div id="detail-content" class="detail-content">
          <!-- Fylls dynamiskt -->
        </div>
      </section>

    </main>

  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
